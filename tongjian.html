const BOOKS = [
  {
    id: "vol1",
    title: "第一卷·战国",
    period: "前403年—前221年",
    chapters: [
      {
        id: "v1c1",
        number: "第一回",
        title: "天下大乱从一场葬礼开始",
        subtitle: "三家分晋",
        period: "前453年—前403年",
        era: "战国·开篇",
        status: "published",
        body: `
<p>公元前453年，晋国，赵、魏、韩三家联手，在晋阳城外的汾河边，把一个叫智伯瑶的男人淹死了。</p>

<p>这件事，在当时看来，不过是贵族内斗的又一个收尾。晋国的卿大夫们互相火并已经打了将近两百年，死过的人比这惨得多。围观的人拍拍手，该干嘛干嘛去了。</p>

<p>但司马光把这一年写在了《资治通鉴》的第一页。</p>

<p>他要告诉所有后来的读者：这不是普通的内斗。这是一道裂缝，从这里开始，整个中国的秩序，碎了。</p>

<h3>一、智伯瑶是个什么样的人</h3>

<p>要讲三家分晋，就得先讲一个人——智伯瑶。</p>

<p>智伯瑶是晋国智氏家族的宗主，当时晋国权力最大的卿大夫。晋国这时候已经是个奇葩政体：名义上有国君，实际上国君就是个吉祥物，真正的权力掌握在赵、魏、韩、智四大家族手里，史称"四卿专晋"。而智伯瑶，就是这四家里最强的那个。</p>

<p>他这个人，才华是真的有，问题也是真的大。</p>

<p>智伯瑶的家臣智果曾经专门跑去族长那里，要求把智瑶从族谱里除名。族长懵了，问他为什么。智果说了一段话，被司马光原文记在了通鉴里，大意是——</p>

<div class="dialogue">
<p><span class="speaker">智果：</span>智瑶这个人有五项过人之处：仪表堂堂，武艺高强，才华横溢，能写好文章，还意志坚定。但他有一个致命的毛病——心胸狭窄，又残忍傲慢。以他的五项才能去欺压别人，谁能受得了？如果他最终得志，智氏家族必然跟着他一起完蛋。我不想死，所以我要和他划清界限。</p>
</div>

<p>族长没听，觉得智果是在危言耸听。</p>

<p>后来的事证明，智果是当时晋国看得最清楚的人。</p>

<h3>二、一顿饭吃出来的死仇</h3>

<p>智伯瑶当政期间，把持朝政，气焰熏天。有一次，他摆宴席请韩、魏、赵三家的家主一起吃饭，酒过三巡，他突然转头，把一杯酒浇到了韩康子的脸上。</p>

<p>大厅里瞬间安静。</p>

<p>韩康子脸色铁青，身边的家臣段规按住了剑柄，死死盯着智伯瑶。但韩康子忍住了，低头，擦了擦脸，继续喝酒。</p>

<p>宴席散了之后，左右的人愤愤不平，说主公您怎么能这样受辱？韩康子长叹一口气：</p>

<div class="dialogue">
<p><span class="speaker">韩康子：</span>智伯这个人，睚眦必报。他要的就是让我发火，好找借口灭了我。我不能给他这个机会。</p>
</div>

<p>忍了。但仇，记下了。</p>

<p>智伯瑶羞辱韩康子，可能只是酒后的一时狂傲，也可能是蓄意试探。但他显然没把这件事放在心上，因为紧接着，他又去欺负赵家了——而且这一次，是正式索地。</p>

<h3>三、赵襄子的骨气</h3>

<p>智伯瑶以晋国公室的名义，向韩、魏、赵三家各索要一块封地，说是要"归还"给晋国国君，充实王室。</p>

<p>这是个套路。三家心里都清楚，土地一旦给出去，名义上归了国君，实际上进了智伯瑶的口袋。</p>

<p>韩康子咬牙给了。魏桓子憋屈地给了。轮到赵家，赵氏家主赵襄子直接拒绝了。</p>

<div class="dialogue">
<p><span class="speaker">赵襄子：</span>土地是祖宗传下来的，凭什么给你？不给。</p>
</div>

<p>智伯瑶大怒，立刻联合韩、魏两家，三路大军压境，围攻赵氏的大本营——晋阳城。</p>

<p>赵襄子退入晋阳死守。智伯瑶引来晋水，挖开汾河，把整座晋阳城泡在了水里。水位涨到城墙垛口，城内炊烟稀少，粮食告急，老鼠被抓来当食物。晋阳被围，整整两年。</p>

<p>城里的人熬着，城外的联军也在熬。</p>

<p>这时候，赵襄子做了一个决定，这个决定后来改变了整个战局。</p>

<h3>四、最关键的一次夜谈</h3>

<p>赵襄子派出了他的谋士张孟谈，秘密出城，去见韩康子和魏桓子。</p>

<p>张孟谈只说了几句话：</p>

<div class="dialogue">
<p><span class="speaker">张孟谈：</span>嘴唇没了，牙齿就会挨冻。今天智伯联合你们两家来灭赵，赵国一旦亡了，下一个挨收拾的是谁？你们自己想清楚。</p>
</div>

<p>韩康子和魏桓子对视了一眼。</p>

<p>他们当然早就想清楚了。这两年，他们每天都要去智伯瑶的大帐汇报战况，智伯瑶每次都趾高气扬，稍有不满就当众羞辱他们。魏桓子的家臣任章私下里说：智伯每天骄横到这种程度，离死也不远了。韩国的谋士段规也劝韩康子说：识时务者为俊杰，现在要看清楚风向。</p>

<p>两人心里早就有了答案，只等一个合适的人来捅破这层窗户纸。</p>

<p>张孟谈就是那个人。</p>

<p>当夜，三方密谋已定：反水。</p>

<h3>五、水淹智伯瑶</h3>

<p>约定好的那一天夜里，赵氏的人悄悄挖开了水坝，把水倒灌向智伯瑶的军营。</p>

<p>智伯瑶的士兵从睡梦中惊醒，大水漫进营帐，一片混乱。</p>

<p>韩、魏两军同时从两翼杀出。</p>

<p>智伯瑶的大军，就这样在自己引来的水里，全线崩溃。</p>

<p>智伯瑶本人死于乱军之中，一说被赵襄子亲手所杀。赵襄子对这个把自己泡了两年水的男人恨之入骨，据说把他的头骨漆成了饮器，日日相对，解恨。</p>

<p>智氏家族，就此覆灭。</p>

<p>智果当年改的那个姓，救了他一条命。</p>

<h3>六、三家分晋，周天子的那一跪</h3>

<p>灭了智伯瑶之后，赵、魏、韩三家瓜分了智氏的全部土地，势力大涨。晋国国君彻底成了摆设。</p>

<p>前403年，距晋阳之战整整五十年后，赵、魏、韩三家的使者联袂来到洛阳，面见周威烈王，要求正式册封三家为诸侯。</p>

<p>周威烈王答应了。</p>

<p>就这样，原本是晋国臣子的三个家族，摇身一变，成了合法的诸侯国君。赵国、魏国、韩国，正式登上历史舞台。</p>

<p>这是一个看起来平常的外交事件，但司马光为什么把这一年定为《资治通鉴》的起点？他在书的开头就给出了答案：</p>

<div class="dialogue">
<p><span class="speaker">司马光：</span>周威烈王册封三家，这是礼崩乐坏的开始。天子亲手承认了以下犯上的合法性，从此，谁强谁就是诸侯，谁有兵谁就能称王。这个口子一旦开了，就再也堵不上了。</p>
</div>

<p>这不只是晋国的问题，这是整个周朝秩序的死亡证明。</p>

<h3>七、为什么赵氏能赢</h3>

<p>回到晋阳之战本身，有一个细节值得多看一眼。</p>

<p>晋阳被围的第二年，城里弹尽粮绝，形势万分危急。赵襄子叫来家臣张孟谈，问他还有什么办法。张孟谈说了一句话：</p>

<div class="dialogue">
<p><span class="speaker">张孟谈：</span>主公，您的祖父赵简子当年建晋阳城时，曾经特意在宫室的地基里埋了一批铜，说是留给后代急用的。现在，或许可以找一找。</p>
</div>

<p>赵襄子让人挖地，真的挖出了大量的铜和积蓄。</p>

<p>这个细节，是真实历史，不是传说。赵简子经营晋阳数十年，把它当作赵氏最后的退路来建设。城墙坚固，粮仓充实，民心向背，早就备好了。</p>

<p>赵氏能在晋阳扛过两年，不是运气，是他的祖父几十年前就埋下的种子。</p>

<p>而智伯瑶败得如此彻底，也不是运气——是他用一生的傲慢，把所有人都逼到了对立面。</p>

<div class="ink-divider">※ ※ ※</div>

<div class="jian-box">
<p>司马光写三家分晋，开篇就讲"名分"。他说，周威烈王册封三家，错不在三家强横，错在天子自己坏了规矩。上位者一旦亲手拆掉了秩序的围栏，就别指望下面的人还会守规矩。智伯瑶这个人，才干出众，却把傲慢当成了权力的装饰品。他能看清赵、韩、魏各自的弱点，却从来没想过——自己的致命弱点，是让所有人都恨他。一个人，无论多强，一旦被逼得天下皆敌，结局只有一个。</p>
</div>

//  STATE
// ═══════════════════════════════════════════════
let currentChapterIndex = 0;
let allChapters = [];

function init() {
  // flatten all chapters
  BOOKS.forEach(vol => {
    vol.chapters.forEach(ch => {
      allChapters.push({ ...ch, volTitle: vol.title, volPeriod: vol.period });
    });
  });
  buildTOC();
  updateStats();
}

function updateStats() {
  const written = allChapters.filter(c => c.status === "published").length;
  document.getElementById('stat-chapter').textContent = written;
}

function buildTOC() {
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  BOOKS.forEach((vol, vi) => {
    const group = document.createElement('div');
    group.className = 'vol-group';

    const header = document.createElement('div');
    header.className = 'vol-header';
    header.innerHTML = `<span>${vol.title}</span><span class="vol-arrow">▶</span>`;
    header.onclick = () => {
      header.classList.toggle('open');
      list.classList.toggle('open');
    };

    const list = document.createElement('div');
    list.className = 'chapter-list';

    // auto-open first vol that has published chapters
    const hasPublished = vol.chapters.some(c => c.status === 'published');
    if (hasPublished || vi === 0) {
      header.classList.add('open');
      list.classList.add('open');
    }

    vol.chapters.forEach(ch => {
      const a = document.createElement('a');
      a.className = 'chapter-item' + (ch.status !== 'published' ? ' locked' : '');
      a.dataset.id = ch.id;
      a.innerHTML = ch.status === 'published'
        ? `${ch.number}·${ch.subtitle}`
        : `${ch.number}·${ch.subtitle}<span class="coming-badge">待更新</span>`;
      if (ch.status === 'published') {
        a.onclick = () => openChapter(ch.id);
      }
      list.appendChild(a);
    });

    group.appendChild(header);
    group.appendChild(list);
    toc.appendChild(group);
  });
}

function openChapter(id) {
  const idx = allChapters.findIndex(c => c.id === id);
  if (idx === -1 || allChapters[idx].status !== 'published') return;
  currentChapterIndex = idx;
  renderChapter(allChapters[idx]);

  // update active state
  document.querySelectorAll('.chapter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
}

function renderChapter(ch) {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('chapter-view').style.display = 'block';

  document.getElementById('cv-eyebrow').textContent = ch.era + ' · ' + ch.period;
  document.getElementById('cv-title').textContent = ch.title;
  document.getElementById('cv-subtitle').textContent = '——' + ch.subtitle;
  document.getElementById('cv-meta').innerHTML = `
    <span><strong>卷册</strong>：${ch.volTitle}</span>
    <span><strong>时间</strong>：${ch.period}</span>
    <span><strong>回次</strong>：${ch.number}</span>
  `;
  document.getElementById('cv-body').innerHTML = ch.body;
  document.getElementById('breadcrumb').innerHTML = `${ch.volTitle} <span>›</span> ${ch.number}`;

  // nav buttons
  const prev = allChapters.slice(0, currentChapterIndex).reverse().find(c => c.status === 'published');
  const next = allChapters.slice(currentChapterIndex + 1).find(c => c.status === 'published');
  document.getElementById('btn-prev').style.visibility = prev ? 'visible' : 'hidden';
  document.getElementById('btn-next').style.visibility = next ? 'visible' : 'hidden';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navChapter(dir) {
  if (dir === -1) {
    const prev = allChapters.slice(0, currentChapterIndex).reverse().find(c => c.status === 'published');
    if (prev) openChapter(prev.id);
  } else {
    const next = allChapters.slice(currentChapterIndex + 1).find(c => c.status === 'published');
    if (next) openChapter(next.id);
  }
}

function showWelcome() {
  document.getElementById('welcome').style.display = 'block';
  document.getElementById('chapter-view').style.display = 'none';
  document.getElementById('breadcrumb').textContent = '首页';
  document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startReading() {
  const first = allChapters.find(c => c.status === 'published');
  if (first) {
    openChapter(first.id);
  } else {
    alert('第一回即将上线，敬请期待！');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

init();
