<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通鉴 · 叙事版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f4edd8;
    --paper-2:      #ede3c8;
    --paper-3:      #e3d7b8;
    --rule:         #c8b898;
    --rule-light:   #ddd0b8;
    --ink-1:        #1c1208;
    --ink-2:        #3a2a18;
    --ink-3:        #7a6448;
    --ink-4:        #b09878;
    --accent:       #6b2a0e;
    --accent-warm:  #a05828;
    --sidebar-bg:   #1a1208;
    --sidebar-2:    #221a0e;
    --sidebar-rule: #2e2218;
    --sidebar-text: #c8b090;
    --sidebar-dim:  #6a5030;
    --sidebar-faint:#3a2818;
    --t-tag:     10px;
    --t-meta:    12px;
    --t-speaker: 13px;
    --t-section: 14px;
    --t-body:    16px;
    --t-title:   48px;
    --t-hero:    80px;
    --sp-xs: 8px; --sp-sm: 16px; --sp-md: 32px;
    --sp-lg: 56px; --sp-xl: 88px;
    --sidebar-w: 264px;
    --content-max: 680px;
    --sans: 'Noto Sans SC', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    font-weight: 300;
    background: var(--paper);
    color: var(--ink-2);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ══════════════════════════════════════════
     首页模式：顶部品牌栏 + 全宽内容
  ══════════════════════════════════════════ */

  /* 顶部品牌栏 — 仅首页显示 */
  #home-topbar {
    height: 52px;
    background: rgba(244,237,216,0.97);
    border-bottom: 1px solid var(--rule-light);
    display: flex;
    align-items: center;
    padding: 0 48px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .home-brand {
    font-size: var(--t-meta);
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--ink-1);
  }

  #home-content {
    max-width: 860px;
    margin: 0 auto;
    padding: var(--sp-xl) 48px 120px;
  }

  /* ══════════════════════════════════════════
     阅读模式：左侧栏 + 右侧内容
  ══════════════════════════════════════════ */
  #reading-layout {
    display: none;
    min-height: 100vh;
  }

  /* 左侧栏 */
  #sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-rule);
    position: fixed;
    top: 0; left: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
    transition: transform 0.28s ease;
    overflow-y: auto;
  }
  #sidebar::-webkit-scrollbar { width: 3px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--sidebar-rule); }

  #sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--sidebar-rule);
    flex-shrink: 0;
  }

  .sidebar-brand {
    font-size: var(--t-meta);
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--sidebar-text);
    cursor: pointer;
    transition: color 0.15s;
    display: block;
  }
  .sidebar-brand:hover { color: #fff; }

  .sidebar-back {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    font-size: var(--t-tag);
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sidebar-faint);
    cursor: pointer;
    transition: color 0.15s;
    border: none;
    background: none;
    font-family: var(--sans);
    padding: 0;
  }
  .sidebar-back:hover { color: var(--sidebar-dim); }

  #toc { flex: 1; padding: 12px 0 40px; }

  .vol-group { border-bottom: 1px solid var(--sidebar-rule); }

  .vol-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    cursor: pointer;
    font-size: var(--t-meta);
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--sidebar-faint);
    transition: color 0.18s;
    user-select: none;
  }
  .vol-header:hover { color: var(--sidebar-dim); }
  .vol-header.open  { color: var(--sidebar-text); }

  .vol-arrow { font-size: var(--t-tag); transition: transform 0.22s; opacity: 0.5; }
  .vol-header.open .vol-arrow { transform: rotate(90deg); opacity: 1; }

  .chapter-list { display: none; background: var(--sidebar-2); padding: 4px 0 8px; }
  .chapter-list.open { display: block; }

  .chapter-item {
    display: block;
    padding: 8px 24px 8px 32px;
    font-size: var(--t-meta);
    font-weight: 300;
    color: var(--sidebar-faint);
    text-decoration: none;
    line-height: 1.55;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    cursor: pointer;
  }
  .chapter-item:hover  { color: var(--sidebar-text); border-left-color: var(--sidebar-dim); padding-left: 36px; }
  .chapter-item.active { color: var(--accent-warm); border-left-color: var(--accent-warm); padding-left: 36px; font-weight: 400; }
  .chapter-item.locked { color: var(--sidebar-faint); opacity: 0.35; cursor: not-allowed; }
  .chapter-item.locked:hover { color: var(--sidebar-faint); border-left-color: transparent; padding-left: 32px; }

  .coming-badge { font-size: var(--t-tag); color: var(--sidebar-faint); margin-left: 4px; opacity: 0.7; }

  /* 右侧阅读区 */
  #reading-main {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #topbar {
    height: 44px;
    background: rgba(244,237,216,0.96);
    border-bottom: 1px solid var(--rule-light);
    display: flex;
    align-items: center;
    padding: 0 56px;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(16px);
  }

  .breadcrumb {
    font-size: var(--t-meta);
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--ink-4);
    flex: 1;
  }
  .breadcrumb span { color: var(--accent); }

  #content-area {
    flex: 1;
    padding: var(--sp-xl) 56px 120px;
    max-width: calc(var(--content-max) + 112px);
  }

  /* ══════════════════════════════════════════
     WELCOME — 首页内容
  ══════════════════════════════════════════ */
  .welcome-title {
    font-size: var(--t-hero);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 0.92;
    color: var(--ink-1);
    margin-bottom: var(--sp-md);
  }

  .welcome-desc {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.45;
    color: var(--ink-1);
    max-width: 560px;
    margin-bottom: var(--sp-sm);
  }

  .welcome-sub {
    font-size: var(--t-body);
    font-weight: 300;
    color: var(--ink-3);
    margin-bottom: var(--sp-lg);
  }

  .welcome-divider {
    width: 100%;
    height: 1px;
    background: var(--rule);
    margin: var(--sp-lg) 0;
  }

  .welcome-stats {
    display: flex;
    border-top: 2px solid var(--ink-1);
    border-bottom: 1px solid var(--rule);
    margin-bottom: var(--sp-lg);
  }

  .stat-item { padding: 20px 0; margin-right: var(--sp-xl); }
  .stat-item:last-child { margin-right: 0; }

  .stat-num {
    display: block;
    font-size: 40px;
    font-weight: 200;
    color: var(--ink-1);
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .stat-label {
    display: block;
    margin-top: 6px;
    font-size: var(--t-meta);
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-4);
  }

  .welcome-cta {
    display: inline-block;
    padding: 13px 28px;
    background: var(--accent);
    color: var(--paper);
    font-size: var(--t-meta);
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.18s;
  }
  .welcome-cta:hover { background: var(--accent-warm); }

  /* ══════════════════════════════════════════
     CHAPTER VIEW — 正文内容
  ══════════════════════════════════════════ */
  #chapter-view { display: none; }

  .chapter-eyebrow {
    font-size: var(--t-meta);
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: var(--sp-sm);
  }

  .chapter-title {
    font-size: var(--t-title);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--ink-1);
    max-width: var(--content-max);
    margin-bottom: 12px;
  }

  .chapter-subtitle {
    font-size: var(--t-meta);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--ink-3);
    margin-bottom: var(--sp-md);
    text-transform: uppercase;
  }

  .chapter-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 24px;
    padding: 12px 0;
    border-top: 2px solid var(--ink-1);
    border-bottom: 1px solid var(--rule);
    margin-bottom: var(--sp-lg);
    font-size: var(--t-meta);
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .chapter-meta strong { font-weight: 500; color: var(--ink-2); margin-right: 4px; }

  .chapter-body {
    font-size: var(--t-body);
    font-weight: 300;
    line-height: 1.95;
    color: var(--ink-2);
    max-width: var(--content-max);
  }

  .chapter-body p { margin-bottom: 1.5em; text-indent: 2em; }

  .chapter-body > p:first-child { text-indent: 0; }
  .chapter-body > p:first-child::first-letter {
    font-size: var(--t-hero);
    font-weight: 900;
    float: left;
    line-height: 0.78;
    margin-right: 6px;
    margin-top: 12px;
    color: var(--accent);
  }

  .chapter-body h3 {
    font-size: var(--t-section);
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--ink-3);
    margin: 3em 0 1.2em;
    text-indent: 0;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }

  .chapter-body .dialogue {
    background: var(--paper-2);
    border-left: 3px solid var(--rule);
    padding: 20px 24px;
    margin: 2em 0;
  }
  .chapter-body .dialogue p {
    text-indent: 0;
    margin-bottom: 0.65em;
    font-size: var(--t-body);
    line-height: 1.85;
  }
  .chapter-body .dialogue p:last-child { margin-bottom: 0; }

  .chapter-body .speaker {
    font-size: var(--t-speaker);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    display: inline-block;
    margin-right: 8px;
  }

  .chapter-body blockquote {
    border-left: 3px solid var(--rule);
    padding: 4px 20px;
    margin: 1.5em 0;
    color: var(--ink-3);
    font-size: var(--t-body);
  }

  .ink-divider {
    display: block;
    text-align: center;
    color: var(--ink-4);
    font-size: var(--t-tag);
    letter-spacing: 0.6em;
    margin: 3em 0;
  }

  .jian-box {
    margin-top: var(--sp-xl);
    padding: 28px 32px;
    background: var(--paper-3);
    border-top: 2px solid var(--ink-1);
    border-bottom: 1px solid var(--rule);
    max-width: var(--content-max);
  }
  .jian-box::before {
    content: 'HISTORIA · 史鉴';
    display: block;
    font-size: var(--t-tag);
    font-weight: 700;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }
  .jian-box p {
    font-size: var(--t-body);
    font-weight: 300;
    line-height: 1.95;
    color: var(--ink-2);
    text-indent: 0 !important;
    font-style: italic;
  }

  .nav-btns {
    display: flex;
    justify-content: space-between;
    margin-top: var(--sp-xl);
    padding-top: var(--sp-md);
    border-top: 1px solid var(--rule);
    max-width: var(--content-max);
    gap: 16px;
  }
  .nav-btn {
    padding: 10px 22px;
    background: none;
    border: 1px solid var(--rule);
    cursor: pointer;
    font-family: var(--sans);
    font-size: var(--t-meta);
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MOBILE ── */
  #menu-toggle {
    display: none;
    position: fixed;
    top: 10px; left: 10px;
    z-index: 200;
    background: var(--sidebar-bg);
    border: 1px solid var(--sidebar-rule);
    color: var(--sidebar-text);
    width: 36px; height: 36px;
    cursor: pointer;
    font-size: 14px;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }

  @media (max-width: 768px) {
    :root { --t-hero: 52px; --t-title: 36px; --sp-xl: 52px; }
    #home-topbar { padding: 0 24px; }
    #home-content { padding: 48px 24px 80px; }
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #reading-main { margin-left: 0; }
    #content-area { padding: 40px 24px 80px; }
    #menu-toggle { display: flex; }
    #topbar { padding: 0 16px 0 52px; }
    .welcome-stats { flex-wrap: wrap; }
    .stat-item { margin-right: var(--sp-md); }
  }
</style>
</head>
<body>

<!-- ══ 首页布局 ══ -->
<div id="home-layout">
  <header id="home-topbar">
    <span class="home-brand">通鉴 · 叙事版</span>
  </header>

  <div id="home-content">
    <div class="welcome-title">通鉴 · 叙事版</div>
    <p class="welcome-desc">历史从来不是故事，它是权力的流动。</p>
    <p class="welcome-sub">用现代叙事方式重读《资治通鉴》。</p>
    <div class="welcome-stats">
      <div class="stat-item">
        <span class="stat-num" id="stat-vol">11</span>
        <div class="stat-label">卷册</div>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-chapter">0</span>
        <div class="stat-label">已更新回数</div>
      </div>
      <div class="stat-item">
        <span class="stat-num">1362</span>
        <div class="stat-label">年历史跨度</div>
      </div>
    </div>
    <div class="welcome-cta" onclick="startReading()">开始阅读 →</div>
  </div>
</div>

<!-- ══ 阅读布局 ══ -->
<div id="reading-layout">
  <button id="menu-toggle" onclick="toggleSidebar()">☰</button>

  <!-- 左侧栏 -->
  <nav id="sidebar">
    <div id="sidebar-header">
      <span class="sidebar-brand" onclick="showWelcome()">通鉴 · 叙事版</span>
      <button class="sidebar-back" onclick="showWelcome()">← 返回首页</button>
    </div>
    <div id="toc"></div>
  </nav>

  <!-- 右侧内容 -->
  <div id="reading-main">
    <div id="topbar">
      <div class="breadcrumb" id="breadcrumb">首页</div>
    </div>
    <div id="content-area">
      <div id="chapter-view">
        <div class="chapter-eyebrow" id="cv-eyebrow"></div>
        <div class="chapter-title" id="cv-title"></div>
        <div class="chapter-subtitle" id="cv-subtitle"></div>
        <div class="chapter-meta" id="cv-meta"></div>
        <div class="chapter-body" id="cv-body"></div>
        <div class="nav-btns">
          <button class="nav-btn" id="btn-prev" onclick="navChapter(-1)">← 上一回</button>
          <button class="nav-btn" onclick="showWelcome()">返回首页</button>
          <button class="nav-btn" id="btn-next" onclick="navChapter(1)">下一回 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const BOOKS = [
  {
    id: "vol1", title: "第一卷·战国", period: "前403年—前221年",
    chapters: [
      { id: "v1c1", number: "第一回", title: "天下大乱从一场葬礼开始", subtitle: "三家分晋", period: "前453年—前403年", era: "战国·开篇", status: "published", body: `
<p>公元前453年，晋国，赵、魏、韩三家联手，在晋阳城外的汾河边，把一个叫智伯瑶的男人淹死了。</p>
<p>这件事，在当时看来，不过是贵族内斗的又一个收尾。晋国的卿大夫们互相火并已经打了将近两百年，死过的人比这惨得多。围观的人拍拍手，该干嘛干嘛去了。</p>
<p>但司马光把这一年写在了《资治通鉴》的第一页。</p>
<p>他要告诉所有后来的读者：这不是普通的内斗。这是一道裂缝，从这里开始，整个中国的秩序，碎了。</p>
<h3>一、智伯瑶是个什么样的人</h3>
<p>要讲三家分晋，就得先讲一个人——智伯瑶。</p>
<p>智伯瑶是晋国智氏家族的宗主，当时晋国权力最大的卿大夫。晋国这时候已经是个奇葩政体：名义上有国君，实际上国君就是个吉祥物，真正的权力掌握在赵、魏、韩、智四大家族手里，史称"四卿专晋"。而智伯瑶，就是这四家里最强的那个。</p>
<p>他这个人，才华是真的有，问题也是真的大。</p>
<p>智伯瑶的家臣智果曾经专门跑去族长那里，要求把智瑶从族谱里除名。族长懵了，问他为什么。智果说了一段话，被司马光原文记在了通鉴里，大意是——</p>
<div class="dialogue">
<p><span class="speaker">智果：</span>智瑶这个人有五项过人之处：仪表堂堂，武艺高强，才华横溢，能写好文章，还意志坚定。但他有一个致命的毛病——心胸狭窄，又残忍傲慢。以他的五项才能去欺压别人，谁能受得了？如果他最终得志，智氏家族必然跟着他一起完蛋。我不想死，所以我要和他划清界限。</p>
</div>
<p>族长没听，觉得智果是在危言耸听。</p>
<p>后来的事证明，智果是当时晋国看得最清楚的人。</p>
<h3>二、一顿饭吃出来的死仇</h3>
<p>智伯瑶当政期间，把持朝政，气焰熏天。有一次，他摆宴席请韩、魏、赵三家的家主一起吃饭，酒过三巡，他突然转头，把一杯酒浇到了韩康子的脸上。</p>
<p>大厅里瞬间安静。</p>
<p>韩康子脸色铁青，身边的家臣段规按住了剑柄，死死盯着智伯瑶。但韩康子忍住了，低头，擦了擦脸，继续喝酒。</p>
<p>宴席散了之后，左右的人愤愤不平，说主公您怎么能这样受辱？韩康子长叹一口气：</p>
<div class="dialogue">
<p><span class="speaker">韩康子：</span>智伯这个人，睚眦必报。他要的就是让我发火，好找借口灭了我。我不能给他这个机会。</p>
</div>
<p>忍了。但仇，记下了。</p>
<p>智伯瑶羞辱韩康子，可能只是酒后的一时狂傲，也可能是蓄意试探。但他显然没把这件事放在心上，因为紧接着，他又去欺负赵家了——而且这一次，是正式索地。</p>
<h3>三、赵襄子的骨气</h3>
<p>智伯瑶以晋国公室的名义，向韩、魏、赵三家各索要一块封地，说是要"归还"给晋国国君，充实王室。</p>
<p>这是个套路。三家心里都清楚，土地一旦给出去，名义上归了国君，实际上进了智伯瑶的口袋。</p>
<p>韩康子咬牙给了。魏桓子憋屈地给了。轮到赵家，赵氏家主赵襄子直接拒绝了。</p>
<div class="dialogue">
<p><span class="speaker">赵襄子：</span>土地是祖宗传下来的，凭什么给你？不给。</p>
</div>
<p>智伯瑶大怒，立刻联合韩、魏两家，三路大军压境，围攻赵氏的大本营——晋阳城。</p>
<p>赵襄子退入晋阳死守。智伯瑶引来晋水，挖开汾河，把整座晋阳城泡在了水里。水位涨到城墙垛口，城内炊烟稀少，粮食告急，老鼠被抓来当食物。晋阳被围，整整两年。</p>
<p>城里的人熬着，城外的联军也在熬。</p>
<p>这时候，赵襄子做了一个决定，这个决定后来改变了整个战局。</p>
<h3>四、最关键的一次夜谈</h3>
<p>赵襄子派出了他的谋士张孟谈，秘密出城，去见韩康子和魏桓子。</p>
<p>张孟谈只说了几句话：</p>
<div class="dialogue">
<p><span class="speaker">张孟谈：</span>嘴唇没了，牙齿就会挨冻。今天智伯联合你们两家来灭赵，赵国一旦亡了，下一个挨收拾的是谁？你们自己想清楚。</p>
</div>
<p>韩康子和魏桓子对视了一眼。</p>
<p>他们当然早就想清楚了。这两年，他们每天都要去智伯瑶的大帐汇报战况，智伯瑶每次都趾高气扬，稍有不满就当众羞辱他们。魏桓子的家臣任章私下里说：智伯每天骄横到这种程度，离死也不远了。韩国的谋士段规也劝韩康子说：识时务者为俊杰，现在要看清楚风向。</p>
<p>两人心里早就有了答案，只等一个合适的人来捅破这层窗户纸。</p>
<p>张孟谈就是那个人。</p>
<p>当夜，三方密谋已定：反水。</p>
<h3>五、水淹智伯瑶</h3>
<p>约定好的那一天夜里，赵氏的人悄悄挖开了水坝，把水倒灌向智伯瑶的军营。</p>
<p>智伯瑶的士兵从睡梦中惊醒，大水漫进营帐，一片混乱。</p>
<p>韩、魏两军同时从两翼杀出。</p>
<p>智伯瑶的大军，就这样在自己引来的水里，全线崩溃。</p>
<p>智伯瑶本人死于乱军之中，一说被赵襄子亲手所杀。赵襄子对这个把自己泡了两年水的男人恨之入骨，据说把他的头骨漆成了饮器，日日相对，解恨。</p>
<p>智氏家族，就此覆灭。</p>
<p>智果当年改的那个姓，救了他一条命。</p>
<h3>六、三家分晋，周天子的那一跪</h3>
<p>灭了智伯瑶之后，赵、魏、韩三家瓜分了智氏的全部土地，势力大涨。晋国国君彻底成了摆设。</p>
<p>前403年，距晋阳之战整整五十年后，赵、魏、韩三家的使者联袂来到洛阳，面见周威烈王，要求正式册封三家为诸侯。</p>
<p>周威烈王答应了。</p>
<p>就这样，原本是晋国臣子的三个家族，摇身一变，成了合法的诸侯国君。赵国、魏国、韩国，正式登上历史舞台。</p>
<p>这是一个看起来平常的外交事件，但司马光为什么把这一年定为《资治通鉴》的起点？他在书的开头就给出了答案：</p>
<div class="dialogue">
<p><span class="speaker">司马光：</span>周威烈王册封三家，这是礼崩乐坏的开始。天子亲手承认了以下犯上的合法性，从此，谁强谁就是诸侯，谁有兵谁就能称王。这个口子一旦开了，就再也堵不上了。</p>
</div>
<p>这不只是晋国的问题，这是整个周朝秩序的死亡证明。</p>
<h3>七、为什么赵氏能赢</h3>
<p>回到晋阳之战本身，有一个细节值得多看一眼。</p>
<p>晋阳被围的第二年，城里弹尽粮绝，形势万分危急。赵襄子叫来家臣张孟谈，问他还有什么办法。张孟谈说了一句话：</p>
<div class="dialogue">
<p><span class="speaker">张孟谈：</span>主公，您的祖父赵简子当年建晋阳城时，曾经特意在宫室的地基里埋了一批铜，说是留给后代急用的。现在，或许可以找一找。</p>
</div>
<p>赵襄子让人挖地，真的挖出了大量的铜和积蓄。</p>
<p>这个细节，是真实历史，不是传说。赵简子经营晋阳数十年，把它当作赵氏最后的退路来建设。城墙坚固，粮仓充实，民心向背，早就备好了。</p>
<p>赵氏能在晋阳扛过两年，不是运气，是他的祖父几十年前就埋下的种子。</p>
<p>而智伯瑶败得如此彻底，也不是运气——是他用一生的傲慢，把所有人都逼到了对立面。</p>
<div class="ink-divider">※ ※ ※</div>
<div class="jian-box">
<p>司马光写三家分晋，开篇就讲"名分"。他说，周威烈王册封三家，错不在三家强横，错在天子自己坏了规矩。上位者一旦亲手拆掉了秩序的围栏，就别指望下面的人还会守规矩。智伯瑶这个人，才干出众，却把傲慢当成了权力的装饰品。他能看清赵、韩、魏各自的弱点，却从来没想过——自己的致命弱点，是让所有人都恨他。一个人，无论多强，一旦被逼得天下皆敌，结局只有一个。</p>
</div>

let currentChapterIndex = 0;
let allChapters = [];

function init() {
  document.body.classList.add('on-welcome');
  BOOKS.forEach(vol => vol.chapters.forEach(ch => allChapters.push({ ...ch, volTitle: vol.title })));
  buildTOC();
  updateStats();
}

function updateStats() {
  document.getElementById('stat-chapter').textContent = allChapters.filter(c => c.status === 'published').length;
}

function buildTOC() {
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  BOOKS.forEach((vol, vi) => {
    const group = document.createElement('div');
    group.className = 'vol-group';
    const header = document.createElement('div');
    header.className = 'vol-header';
    header.innerHTML = `<span>${vol.title}</span><span class="vol-arrow">▶</span>`;
    const list = document.createElement('div');
    list.className = 'chapter-list';
    header.onclick = () => { header.classList.toggle('open'); list.classList.toggle('open'); };
    if (vol.chapters.some(c => c.status === 'published') || vi === 0) {
      header.classList.add('open'); list.classList.add('open');
    }
    vol.chapters.forEach(ch => {
      const a = document.createElement('a');
      a.className = 'chapter-item' + (ch.status !== 'published' ? ' locked' : '');
      a.dataset.id = ch.id;
      a.innerHTML = ch.status === 'published'
        ? `${ch.number}·${ch.subtitle}`
        : `${ch.number}·${ch.subtitle}<span class="coming-badge">待更新</span>`;
      if (ch.status === 'published') a.onclick = () => openChapter(ch.id);
      list.appendChild(a);
    });
    group.appendChild(header); group.appendChild(list); toc.appendChild(group);
  });
}

function openChapter(id) {
  const idx = allChapters.findIndex(c => c.id === id);
  if (idx === -1 || allChapters[idx].status !== 'published') return;
  currentChapterIndex = idx;
  // 切换到阅读布局
  document.getElementById('home-layout').style.display = 'none';
  document.getElementById('reading-layout').style.display = 'block';
  document.getElementById('chapter-view').style.display = 'block';
  renderChapter(allChapters[idx]);
  document.querySelectorAll('.chapter-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  document.getElementById('sidebar').classList.remove('open');
}

function renderChapter(ch) {
  document.getElementById('cv-eyebrow').textContent = ch.era + ' · ' + ch.period;
  document.getElementById('cv-title').textContent = ch.title;
  document.getElementById('cv-subtitle').textContent = '—— ' + ch.subtitle;
  document.getElementById('cv-meta').innerHTML = `
    <span><strong>卷册</strong>：${ch.volTitle}</span>
    <span><strong>时间</strong>：${ch.period}</span>
    <span><strong>回次</strong>：${ch.number}</span>`;
  document.getElementById('cv-body').innerHTML = ch.body;
  document.getElementById('breadcrumb').innerHTML = `${ch.volTitle} <span>›</span> ${ch.number}`;
  const prev = allChapters.slice(0, currentChapterIndex).reverse().find(c => c.status === 'published');
  const next = allChapters.slice(currentChapterIndex + 1).find(c => c.status === 'published');
  document.getElementById('btn-prev').style.visibility = prev ? 'visible' : 'hidden';
  document.getElementById('btn-next').style.visibility = next ? 'visible' : 'hidden';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navChapter(dir) {
  const target = dir === -1
    ? allChapters.slice(0, currentChapterIndex).reverse().find(c => c.status === 'published')
    : allChapters.slice(currentChapterIndex + 1).find(c => c.status === 'published');
  if (target) openChapter(target.id);
}

function showWelcome() {
  document.body.classList.add('on-welcome');
  document.getElementById('home-layout').style.display = 'block';
  document.getElementById('reading-layout').style.display = 'none';
  document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startReading() {
  const first = allChapters.find(c => c.status === 'published');
  if (first) openChapter(first.id);
  else alert('第一回即将上线，敬请期待！');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

init();
</script>
